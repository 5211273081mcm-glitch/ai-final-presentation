<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>用 AI 重构舆情工作范式 · 决赛演讲板</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/final.css"/>
</head>
<body>
<canvas class="star-bg" id="starbg"></canvas>
<div class="grid-bg"></div>
<div class="scan-line"></div>
<div class="hud-frame"><div class="hud-corner-tr"></div><div class="hud-corner-bl"></div></div>

<nav class="topbar">
  <div class="brand"><div class="mark">AI</div><div>用 AI 重构舆情工作范式 · 决赛</div></div>
  <div class="topbar-right"><button id="btn-motion" style="margin-right:16px;padding:4px 12px;background:transparent;border:1px solid var(--line-faint);color:var(--ink-3);cursor:pointer;font-size:11px;">动画降级</button><span class="pulse-dot"></span><span id="clock" class="mono">00:00</span></div>
</nav>

<aside class="side-rail" id="side-rail"></aside>

<div class="stage-wrap" id="stage-wrap">
  <div class="scene-viewport" id="scene-viewport">
    <div class="scene-stage" id="scene-stage"></div>
  </div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
<div class="beat-indicator mono" id="beat-indicator">01 · 1/3</div>

<div class="controls-hint" id="controls-hint">
  <span><kbd>空格</kbd> 推进</span><span><kbd>←</kbd><kbd>→</kbd> 切章</span>
  <span><kbd>E</kbd> 成果演示</span><span><kbd>F</kbd> 全屏</span>
</div>

<button class="evidence-trigger hidden" id="evidence-trigger">结合AI成果演示</button>

<aside class="evidence-drawer" id="evidence-drawer">
  <div class="drawer-head"><h3>结合AI成果演示</h3><button id="evidence-close">×</button></div>
  <p class="drawer-intro" id="drawer-intro"></p>
  <div class="drawer-body" id="drawer-body"></div>
</aside>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close">×</button>
  <button class="lb-nav lb-prev" id="lb-prev">‹</button>
  <img id="lb-img" alt=""/>
  <button class="lb-nav lb-next" id="lb-next">›</button>
  <p class="lb-cap" id="lb-cap"></p>
</div>

<div class="page-flash" id="page-flash"></div>

<script src="js/presentation.all.js"></script>
</body>
</html>
